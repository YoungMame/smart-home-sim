services:

  core:
    build:
      context: ./simulator
      target: dev
    container_name: smart-home-core
    ports:
      - "4000:4000"   # Simulator API — logs, data, event triggers
    environment:
      - MQTT_BROKER_URL=${MQTT_BROKER_URL:-mqtt://mqtt-broker:1883}
    volumes:
      - ./simulator/dist:/dist
    depends_on:
      mqtt-broker:
        condition: service_started
        required: false
    restart: unless-stopped
    stdin_open: true
    tty: true
    develop:
      watch:
        - action: sync+restart
          path: ./simulator/src
          target: /simulator/src

  mqtt-broker:
    image: eclipse-mosquitto:2.1.2-alpine
    container_name: smart-home-mqtt
    profiles: ["broker"]
    ports:
      - "1883:1883"   # MQTT TCP
      - "9001:9001"   # MQTT over WebSocket
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped

  api:
    build: ./api
    container_name: smart-home-api
    ports:
      - "3000:3000"   # Per-device REST APIs
      - "8080:8080"   # Per-device WebSocket
    environment:
      - NODE_ENV=development
      - MQTT_BROKER_URL=${MQTT_BROKER_URL:-mqtt://mqtt-broker:1883}
    depends_on:
      mqtt-broker:
        condition: service_started
        required: false
    restart: unless-stopped
    develop:
      watch:
        - action: sync+restart
          path: ./api
          target: /app
          ignore:
            - node_modules/

  test:
    build:
      context: ./simulator
      target: test
    container_name: smart-home-tests
    profiles: ["test"]

volumes:
  mosquitto_data:
  mosquitto_log:
