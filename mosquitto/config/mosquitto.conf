# Listener TCP standard MQTT
listener 1883

# Listener WebSocket (MQTT over WS)
listener 9001
protocol websockets

# Allow anonymous connections (development only)
allow_anonymous true

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information
